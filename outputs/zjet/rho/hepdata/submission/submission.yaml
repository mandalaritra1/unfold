---
comment: Normalized differential cross sections for the leading AK8 (anti-kT, R=0.8)
  jet in Z(->ll)+jet events at sqrt(s)=13 TeV (CMS Run 2). The observable is log10(rho^2)
  with rho = m/(pT R), measured separately for groomed (Soft Drop beta=0, zcut=0.1)
  and ungroomed jet mass, in three leading-jet pT bins (200-290, 290-400, >400 GeV).
  Each distribution is normalized to unit area within its pT bin. Statistical uncertainties
  are from a 10-way jackknife; systematic uncertainties are the quadrature sum of
  all sources. Bin-to-bin correlation matrices (statistical and total) are provided
  as separate tables.
---
name: Groomed 200-290 GeV
location: Normalized cross section vs log10(rho^2), groomed, pT 200-290 GeV
description: 'Normalized differential cross section (1/sigma) dsigma/dlog10(rho^2)
  for the groomed leading AK8 jet, 200-290 GeV. rho = m/(pT R), R=0.8. Errors: stat
  (jackknife) and sys (total).'
keywords:
- name: reactions
  values:
  - P P --> Z0 < LEPTON+ LEPTON- > JET X
- name: observables
  values:
  - DSIG/DLOG10(RHO**2)
- name: cmenergies
  values:
  - 13000
- name: phrases
  values:
  - Inclusive
  - Z production
  - Jet Production
  - Jet mass
  - Jet substructure
  - Differential cross section
data_file: table_groomed_pt0.yaml
